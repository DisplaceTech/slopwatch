<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="#6b4ea0"/>

  <!-- Antenna -->
  <rect x="60.5" y="20" width="7" height="16" rx="3.5" fill="#ffffff"/>
  <circle cx="64" cy="20" r="7" fill="#ffffff"/>

  <!-- Robot ears -->
  <rect x="20" y="56" width="8" height="22" rx="4" fill="#ffffff"/>
  <rect x="100" y="56" width="8" height="22" rx="4" fill="#ffffff"/>

  <!-- Robot head -->
  <rect x="28" y="38" width="72" height="58" rx="16" fill="#ffffff"/>

  <!-- Left eye: normal dot -->
  <circle cx="49" cy="62" r="8" fill="#6b4ea0"/>

  <!-- Right eye: a magnifying glass (the "investigation" play) -->
  <circle cx="79" cy="60" r="9.5" fill="#ffffff" stroke="#6b4ea0" stroke-width="4.5"/>
  <line x1="86" y1="67" x2="93" y2="74" stroke="#6b4ea0" stroke-width="5" stroke-linecap="round"/>

  <!-- Mouth: robot grille -->
  <rect x="44" y="80" width="6" height="8" rx="2" fill="#6b4ea0"/>
  <rect x="54" y="80" width="6" height="8" rx="2" fill="#6b4ea0"/>
  <rect x="64" y="80" width="6" height="8" rx="2" fill="#6b4ea0"/>
  <rect x="74" y="80" width="6" height="8" rx="2" fill="#6b4ea0"/>
</svg>
